naftiko: 1.0.0-alpha2
info:
  label: Financial Modeling Prep API
  description: 'Financial Modeling Prep API. 10 operations. Lead operation: Get company balance sheet. Self-contained Naftiko
    capability covering one Financial Modeling Prep business surface.'
  tags:
  - Financial Modeling Prep
  - Financial Modeling Prep API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FINANCIAL_MODELING_PREP_API_KEY: FINANCIAL_MODELING_PREP_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-modeling-prep
    baseUri: https://financialmodelingprep.com/api/v3
    description: Financial Modeling Prep API business capability. Self-contained, no shared references.
    resources:
    - name: balance-sheet-statement-symbol
      path: /balance-sheet-statement/{symbol}
      operations:
      - name: getbalancesheet
        method: GET
        description: Get company balance sheet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cash-flow-statement-symbol
      path: /cash-flow-statement/{symbol}
      operations:
      - name: getcashflowstatement
        method: GET
        description: Get company cash flow statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: historical-price-full-symbol
      path: /historical-price-full/{symbol}
      operations:
      - name: gethistoricalprice
        method: GET
        description: Get historical end-of-day prices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: from
          in: query
          type: string
        - name: to
          in: query
          type: string
    - name: income-statement-symbol
      path: /income-statement/{symbol}
      operations:
      - name: getincomestatement
        method: GET
        description: Get company income statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: insider-trading
      path: /insider-trading
      operations:
      - name: getinsidertrading
        method: GET
        description: Get insider transactions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: symbol
          in: query
          type: string
    - name: profile-symbol
      path: /profile/{symbol}
      operations:
      - name: getcompanyprofile
        method: GET
        description: Get company profile
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: quote-symbol
      path: /quote/{symbol}
      operations:
      - name: getquote
        method: GET
        description: Get real-time stock quote
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ratios-symbol
      path: /ratios/{symbol}
      operations:
      - name: getfinancialratios
        method: GET
        description: Get company financial ratios
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: search
      path: /search
      operations:
      - name: searchsymbols
        method: GET
        description: Search for ticker symbols
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: exchange
          in: query
          type: string
    - name: stock-list
      path: /stock/list
      operations:
      - name: liststocks
        method: GET
        description: List all available stock symbols
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.FINANCIAL_MODELING_PREP_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: financial-modeling-prep-rest
    port: 8080
    description: REST adapter for Financial Modeling Prep API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/balance-sheet-statement/{symbol}
      name: balance-sheet-statement-symbol
      description: REST surface for balance-sheet-statement-symbol.
      operations:
      - method: GET
        name: getbalancesheet
        description: Get company balance sheet
        call: financial-modeling-prep.getbalancesheet
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cash-flow-statement/{symbol}
      name: cash-flow-statement-symbol
      description: REST surface for cash-flow-statement-symbol.
      operations:
      - method: GET
        name: getcashflowstatement
        description: Get company cash flow statement
        call: financial-modeling-prep.getcashflowstatement
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/historical-price-full/{symbol}
      name: historical-price-full-symbol
      description: REST surface for historical-price-full-symbol.
      operations:
      - method: GET
        name: gethistoricalprice
        description: Get historical end-of-day prices
        call: financial-modeling-prep.gethistoricalprice
        with:
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/income-statement/{symbol}
      name: income-statement-symbol
      description: REST surface for income-statement-symbol.
      operations:
      - method: GET
        name: getincomestatement
        description: Get company income statement
        call: financial-modeling-prep.getincomestatement
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/insider-trading
      name: insider-trading
      description: REST surface for insider-trading.
      operations:
      - method: GET
        name: getinsidertrading
        description: Get insider transactions
        call: financial-modeling-prep.getinsidertrading
        with:
          symbol: rest.symbol
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/profile/{symbol}
      name: profile-symbol
      description: REST surface for profile-symbol.
      operations:
      - method: GET
        name: getcompanyprofile
        description: Get company profile
        call: financial-modeling-prep.getcompanyprofile
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/quote/{symbol}
      name: quote-symbol
      description: REST surface for quote-symbol.
      operations:
      - method: GET
        name: getquote
        description: Get real-time stock quote
        call: financial-modeling-prep.getquote
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ratios/{symbol}
      name: ratios-symbol
      description: REST surface for ratios-symbol.
      operations:
      - method: GET
        name: getfinancialratios
        description: Get company financial ratios
        call: financial-modeling-prep.getfinancialratios
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: GET
        name: searchsymbols
        description: Search for ticker symbols
        call: financial-modeling-prep.searchsymbols
        with:
          query: rest.query
          limit: rest.limit
          exchange: rest.exchange
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/stock/list
      name: stock-list
      description: REST surface for stock-list.
      operations:
      - method: GET
        name: liststocks
        description: List all available stock symbols
        call: financial-modeling-prep.liststocks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-modeling-prep-mcp
    port: 9090
    transport: http
    description: MCP adapter for Financial Modeling Prep API. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-company-balance-sheet
      description: Get company balance sheet
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getbalancesheet
      outputParameters:
      - type: object
        mapping: $.
    - name: get-company-cash-flow-statement
      description: Get company cash flow statement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getcashflowstatement
      outputParameters:
      - type: object
        mapping: $.
    - name: get-historical-end-day-prices
      description: Get historical end-of-day prices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.gethistoricalprice
      with:
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
    - name: get-company-income-statement
      description: Get company income statement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getincomestatement
      outputParameters:
      - type: object
        mapping: $.
    - name: get-insider-transactions
      description: Get insider transactions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getinsidertrading
      with:
        symbol: tools.symbol
      outputParameters:
      - type: object
        mapping: $.
    - name: get-company-profile
      description: Get company profile
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getcompanyprofile
      outputParameters:
      - type: object
        mapping: $.
    - name: get-real-time-stock-quote
      description: Get real-time stock quote
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getquote
      outputParameters:
      - type: object
        mapping: $.
    - name: get-company-financial-ratios
      description: Get company financial ratios
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.getfinancialratios
      outputParameters:
      - type: object
        mapping: $.
    - name: search-ticker-symbols
      description: Search for ticker symbols
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.searchsymbols
      with:
        query: tools.query
        limit: tools.limit
        exchange: tools.exchange
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-available-stock-symbols
      description: List all available stock symbols
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-modeling-prep.liststocks
      outputParameters:
      - type: object
        mapping: $.
