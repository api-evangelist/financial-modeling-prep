aid: financial-modeling-prep
name: Financial Modeling Prep
description: >-
  Financial Modeling Prep (FMP) provides financial market data via REST APIs,
  including real-time and historical stock quotes, company fundamentals,
  income statements, balance sheets, cash flow statements, financial ratios,
  insider transactions, earnings, dividends, ETF and mutual fund data, and
  economic indicators - with up to 30 years of historical coverage.
